version: '3.8'

services:
  # ============================================================
  # GOE OS - الخدمة الرئيسية
  # ============================================================
  goe-os:
    build: .
    container_name: goe-os
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports/output:/app/reports/output
    restart: unless-stopped
    networks:
      - goe-network

  # ============================================================
  # Redis - للتخزين المؤقت والإشعارات الفورية
  # ============================================================
  redis:
    image: redis:alpine
    container_name: goe-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - goe-network

  # ============================================================
  # Prometheus - للمراقبة وجمع المقاييس
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: goe-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - goe-network

  # ============================================================
  # Grafana - لوحات تحكم مرئية
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: goe-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    restart: unless-stopped
    networks:
      - goe-network

# ============================================================
# الشبكات والمجلدات المشتركة
# ============================================================

networks:
  goe-network:
    driver: bridge

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
